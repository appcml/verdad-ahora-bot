name: Verdad Ahora - Publicador Viral

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  publicar:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout código
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        sudo apt-get update
        sudo apt-get install -y fonts-dejavu-core
        
    - name: Crear directorios de datos
      run: mkdir -p data
      
    - name: Debug - Ver estructura
      run: |
        echo "Estructura del repositorio:"
        ls -la
        echo "Buscando main.py:"
        find . -name "*.py" -type f
      
    - name: Cargar estado anterior
      uses: actions/download-artifact@v4
      with:
        name: bot-estado
        path: data/
      continue-on-error: true
      
    - name: Ejecutar Bot Verdad Ahora
      env:
        FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
        FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
        NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
      run: python main.py
      
    - name: Guardar estado para siguiente ejecución
      uses: actions/upload-artifact@v4
      with:
        name: bot-estado
        path: data/
        retention-days: 7
